name: SATH — DGA Data Bridge

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-dga-data:
    name: Fetch DGA Hidrométrico
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch DGA data
        env:
          DGA_USER: ${{ secrets.DGA_USER }}
          DGA_PASS: ${{ secrets.DGA_PASS }}
        run: python fetch_dga.py

      - name: Patch SATH dashboard
        run: python patch_sath.py

      - name: Commit updated files
        run: |
          git config --global user.email "sath-bridge[bot]@github.com"
          git config --global user.name  "SATH DGA Bridge"
          git add docs/dga_losrios.json docs/SATH_v5.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "DGA data + SATH patch: ${TIMESTAMP}"
            git push
            echo "Publicado en GitHub Pages"
          fi
